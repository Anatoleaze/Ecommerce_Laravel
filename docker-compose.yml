services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel-app
    volumes:
      - .:/var/www
      - /var/www/vendor # ← protège vendor/ du volume
      - /var/www/node_modules # ← protège node_modules aussi
    ports:
      - "9000:9000"
    depends_on:
      - db
    entrypoint: >
      sh -c "chmod -R o+rx /var/www &&
            chmod -R 777 /var/www/storage &&
            chmod -R 777 /var/www/bootstrap/cache &&
            chown -R www-data:www-data /var/www/storage /var/www/bootstrap/cache &&
            mkdir -p /var/www/public/images &&
            chmod -R 775 /var/www/public/images &&
            cp -n /var/www/.env.local /var/www/.env &&
            docker-php-entrypoint php-fpm"

  nginx:
    image: nginx:stable-alpine
    container_name: laravel-nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
      - node

  node:
    image: node:22
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"

  db:
    image: mysql:8.0
    container_name: laravel-mysql
    restart: always
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
